version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: spa_jauria_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: db_spa_jauria
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  #esto permite la conexion desde DBeaver
